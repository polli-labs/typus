name: Build & publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.10.12"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Sync locked dependencies (dev + sqlite + loader + docs extras)
        run: |
          uv sync --locked --extra dev --extra sqlite --extra loader --extra docs
      - name: Canonical quality gate
        env:
          TYPUS_ELEVATION_TEST: "0"
        run: |
          make check-all

  build-and-publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to upload release asset
      id-token: write  # for OIDC (if you prefer it)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.10.12"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Sync locked publish tools
        run: uv sync --locked --extra dev

      - name: Build distributions
        run: |
          uv build --clear
          uv run --locked --extra dev twine check dist/*

      - name: Publish to TestPyPI
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_KEY }}
        run: uv run --locked --extra dev twine upload -r testpypi dist/*

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/v') && github.repository == 'polli-labs/typus'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_KEY }}
        run: uv run --locked --extra dev twine upload dist/*

      - name: Upload wheel as GitHub release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  deploy-docs:
    name: Deploy Docs to VPS
    runs-on: ubuntu-latest
    needs: build-and-publish
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    concurrency:
      group: docs-deploy
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.10.12"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - run: uv sync --locked --extra docs
      - run: uv run --locked --extra docs mkdocs build
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.POLLISERVE0_SSH_PRIVATE_KEY }}
      - name: Check SSH connectivity
        run: |
          echo "Checking SSH connectivity to docs host..."
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            ${{ secrets.POLLISERVE0_SSH_USER }}@${{ secrets.POLLISERVE0_SSH_PUBLIC_HOST }} echo ok
      - run: |
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            site/ ${{ secrets.POLLISERVE0_SSH_USER }}@${{ secrets.POLLISERVE0_SSH_PUBLIC_HOST }}:/var/www/docs.polli.ai/html/typus/
