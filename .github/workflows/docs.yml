name: Docs

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  deploy-docs:
    name: Build & Deploy Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.10.12"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Sync locked docs environment
        run: |
          uv sync --locked --extra docs
      - name: Build docs
        run: uv run --locked --extra docs mkdocs build
      - name: Add SSH key
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
        with:
          ssh-private-key: ${{ secrets.POLLISERVE0_SSH_PRIVATE_KEY }}
      - name: Check SSH connectivity
        run: |
          echo "Checking SSH connectivity to docs host..."
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            ${{ secrets.POLLISERVE0_SSH_USER }}@${{ secrets.POLLISERVE0_SSH_PUBLIC_HOST }} echo ok
      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            site/ ${{ secrets.POLLISERVE0_SSH_USER }}@${{ secrets.POLLISERVE0_SSH_PUBLIC_HOST }}:/var/www/docs.polli.ai/html/typus/
      - name: Upload built site as artifact on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: site
          path: site/
